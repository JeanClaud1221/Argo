apiVersion: apps/v1
kind: Deployment
metadata:
  name: netshoot-calico-deploy
  namespace: kube-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: netshoot
  template:
    metadata:
      labels:
        app: netshoot
    spec:
      hostNetwork: true
      tolerations:
      - key: "node-role.kubernetes.io/control-plane"
        operator: "Exists"
        effect: "NoSchedule"
      nodeSelector:
        node-role.kubernetes.io/control-plane: ""
      containers:
      - image: nicolaka/netshoot
        name: netshoot
        command: ["/bin/sh", "-c", "while true; do sleep 30; done"]
