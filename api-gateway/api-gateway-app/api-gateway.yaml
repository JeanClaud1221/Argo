apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-gateway-fabric
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/nginx/nginx-gateway-fabric
    path: charts/nginx-gateway-fabric
    targetRevision: main
    helm:
      values: |
        nginxGateway:
          gatewayClassName: nginx
          gatewayControllerName: gateway.nginx.org/nginx-gateway-controller
        replicaCount: 2
  destination:
    server: https://kubernetes.default.svc
    namespace: nginx-gateway
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
